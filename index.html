<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adspector HTML</title>
    <style>
        * { box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { background: #f3f0ff; padding: 30px; display: flex; justify-content: center; }
        .container { max-width: 1100px; width: 100%; background: white; padding: 30px; border-radius: 24px; box-shadow: 0 12px 40px rgba(120, 80, 200, 0.15); border: 1px solid #e8e0f5; }
        h1 { margin-top: 0; color: #4a1a8a; font-weight: 700; }
        .row { display: flex; gap: 20px; flex-wrap: wrap; }
        .col { flex: 1; min-width: 300px; }
        label { font-weight: 600; font-size: 14px; color: #4a1a8a; display: block; margin: 16px 0 6px; }
        select, textarea { width: 100%; padding: 12px; border: 2px solid #d8caf5; border-radius: 12px; font-size: 14px; font-family: 'Courier New', monospace; background: #faf8ff; transition: 0.2s; }
        select:focus, textarea:focus { outline: none; border-color: #7c3aed; background: white; box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.1); }
        textarea { height: 280px; resize: vertical; }
        .output { background: #f8f5ff; border: 2px solid #d8caf5; border-radius: 12px; padding: 16px; font-family: 'Courier New', monospace; font-size: 13px; white-space: pre-wrap; word-break: break-all; max-height: 500px; overflow-y: auto; }
        .btn { background: #7c3aed; color: white; border: none; padding: 14px 28px; border-radius: 40px; font-weight: 600; font-size: 16px; cursor: pointer; margin-top: 20px; width: 100%; transition: 0.2s; }
        .btn:hover { background: #5b21b6; transform: scale(1.01); box-shadow: 0 8px 25px rgba(124, 58, 237, 0.3); }
        .btn-copy { background: #6d28d9; margin-top: 10px; }
        .btn-copy:hover { background: #4c1d95; }
        .badge { background: #7c3aed; color: white; border-radius: 40px; padding: 4px 14px; font-size: 13px; font-weight: 500; }
        .info-box { background: #ede9fe; border-left: 4px solid #7c3aed; padding: 12px 16px; border-radius: 8px; margin: 12px 0; font-size: 14px; color: #3b1a6e; }
        .footer { margin-top: 24px; color: #7c6a9e; font-size: 14px; border-top: 1px solid #e8e0f5; padding-top: 20px; text-align: center; }
        .macro-list { display: flex; gap: 12px; flex-wrap: wrap; margin: 8px 0; }
        .macro-tag { background: #ddd6fe; color: #4a1a8a; padding: 4px 14px; border-radius: 20px; font-family: 'Courier New', monospace; font-size: 13px; font-weight: 500; }
        .preset-buttons { display: flex; gap: 8px; flex-wrap: wrap; margin: 8px 0; }
        .preset-btn { background: #ede9fe; border: none; padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; color: #4a1a8a; cursor: pointer; transition: 0.2s; }
        .preset-btn:hover { background: #ddd6fe; transform: scale(1.05); }
    </style>
</head>
<body>
<div class="container">
    <h1>🔮 Adspector HTML</h1>
    <div class="info-box" id="infoBox">⚡ Выбери верификатора</div>
    <div class="row">
        <div class="col">
            <label for="verificator">🔹 Верификатор</label>
            <select id="verificator" onchange="updateInfo()">
                <option value="adserving">Адсервинг</option>
                <option value="adriver">Адривер</option>
                <option value="weborama">Веборама</option>
            </select>
            <label>📋 Быстрая вставка</label>
            <div class="preset-buttons">
                <button class="preset-btn" onclick="loadPreset('adserving')">Адсервинг</button>
                <button class="preset-btn" onclick="loadPreset('adriver')">Адривер</button>
                <button class="preset-btn" onclick="loadPreset('weborama')">Веборама</button>
            </div>
            <label for="inputCode">📄 Исходный код</label>
            <textarea id="inputCode" placeholder="Вставь код..."></textarea>
            <button class="btn" onclick="transform()">⚡ Преобразовать</button>
        </div>
        <div class="col">
            <label>✅ Результат</label>
            <div id="output" class="output">Нажми «Преобразовать»</div>
            <button class="btn btn-copy" onclick="copyOutput()">📋 Скопировать</button>
        </div>
    </div>
    <div class="footer">🔧 Вставь код → выбери верификатора → получи результат</div>
</div>
<script>
    const PRESETS = {
        adserving: `<script src="https://bs.serving-sys.ru/Serving/adServer.bs?c=28&cn=display&pli=1090409665&w=160&h=600&ord=[timestamp]&z=10000&pcp=$$[[APP_ID]]$$&LineID=$$erid$$"><\/script>
<noscript>
<a href="!!https://bs.serving-sys.ru/Serving/adServer.bs?cn=brd&pli=1090409665&Page=&Pos=-1221349322&LineID=$$erid$$&ord=[timestamp]" target="_blank">
<img src="https://bs.serving-sys.ru/Serving/adServer.bs?c=8&cn=display&pli=1090409665&Page=&Pos=-1221349322&pcp=$$[[APP_ID]]$$&ord=[timestamp]" border=0 width=160 height=600><\/a>
<\/noscript>`,
        adriver: `<!-- AdRiver code START -->
<script>
window.adrivermraiddata = window.adrivermraiddata || {};
window.adrivermraiddata.trackers = {};
(function(SRC) {
    var script = document.createElement('script');
    script.setAttribute('type', 'text/javascript');
    script.src = SRC.split('[[RANDOM]]').join(~~(1E6 * Math.random()));
    document.querySelector('head').appendChild(script);
})('https://ad.adriver.ru/cgi-bin/merle.cgi?sid=1&bt=11&tuid=1&ad=111111&pid=0000000&bid=0000000&bn=0000000&exss=&rnd=[[RANDOM]]');
<\/script>
<!-- AdRiver code END -->`,
        weborama: `<script type="text/javascript">
var adperfobj = {
account_id : 9633
,tracking_element_id : 794
,width : 300
,height : 250
,fullhost : 'wcm.weborama-tech.ru'
,random : '[RANDOM]'
,burst : 'auto'
,imptrackers : []
,clicktrackers : []
,customparameter : ''
,publisherclick : '[PUBLISHER_TRACKING_URL]'
,erid : '[ERID]'
,er : 1
};
document.write('<scr'+'ipt language="javascript" src="https://cstatic-ru-cv.weborama-tech.ru/public/js/advertiserv2/ru/adperf_launch_1.0.0_scrambled.js"><\/scr'+'ipt>');
<\/script>
<noscript>
<a href="https://wcm.weborama-tech.ru/fcgi-bin/dispatch.fcgi?a.A=cl&a.si=9633&a.te=794&a.bk=1&g.ism=0&a.ra=[RANDOM]&g.lu=" target="_blank">
<img src="https://wcm.weborama-tech.ru/fcgi-bin/dispatch.fcgi?a.A=im&a.si=9633&a.te=794&a.he=250&a.wi=300&a.hr=R&a.bk=1&g.ism=0&a.ra=[RANDOM]" width="300" height="250" style="border:0px"/>
<\/a>
<\/noscript>`
    };

    function loadPreset(key) {
        document.getElementById('inputCode').value = PRESETS[key];
        transform();
    }

    const INFO = {
        adserving: {
            label: 'Адсервинг',
            macros: ['ncu=$$[[CLICK_TRACKING_BEACON]]$$& (только в script)', '[[CLICK_TRACKING_BEACON]] (только в href)', '$$[[CREATIVE_ORD_TOKEN]]$$', 'vurl=$$[[APP_ID]]$$ (только в src)'],
            description: 'Заменяем $$erid$$ → $$[[CREATIVE_ORD_TOKEN]]$$, добавляем ncu= и vurl='
        },
        adriver: {
            label: 'Адривер',
            macros: ['[[CLICK_TRACKING_BEACON]]', '[[RANDOM]]', '[[CREATIVE_ORD_TOKEN]]', '[[EVENT_ID]]'],
            description: 'Добавляем трекер кликов в window.adrivermraiddata.trackers.click'
        },
        weborama: {
            label: 'Веборама',
            macros: ['[[CLICK_TRACKING_BEACON]]', '[[EVENT_ID]]', '[[CREATIVE_ORD_TOKEN]]', '[[RANDOM]]', '[[CLICK_PREFIX]]'],
            description: 'Меняем clicktrackers, customparameter, erid, random и добавляем [[CLICK_PREFIX]] в href'
        }
    };

    function updateInfo() {
        const select = document.getElementById('verificator');
        const infoBox = document.getElementById('infoBox');
        const key = select.value;
        const info = INFO[key];
        if (info) {
            let macrosHtml = info.macros.map(m => `<span class="macro-tag">${m}</span>`).join('');
            infoBox.innerHTML = `⚡ <b>${info.label}:</b> ${info.description}<div class="macro-list">${macrosHtml}</div>`;
        }
    }

    // =============================================
    //  АДСЕРВИНГ
    // =============================================
    function transformAdserving(code) {
        code = code.replace(/\$\$erid\$\$/g, function() {
            return '$$[[CREATIVE_ORD_TOKEN]]$$';
        });

        code = code.replace(
            /(<script[^>]*src="https:\/\/bs\.serving-sys\.ru\/Serving\/adServer\.bs\?)([^"]*)"/g,
            function(match, prefix, params) {
                if (params.includes('ncu=')) return match;
                return prefix + 'ncu=$$[[CLICK_TRACKING_BEACON]]$$&' + params + '"';
            }
        );

        code = code.replace(
            /(src="https:\/\/bs\.serving-sys\.ru\/Serving\/adServer\.bs\?)([^"]*)"/g,
            function(match, prefix, params) {
                if (params.includes('vurl=')) return match;
                return prefix + params + '&vurl=$$[[APP_ID]]$$"';
            }
        );

        code = code.replace(
            /href="(https:\/\/bs\.serving-sys\.ru\/Serving\/adServer\.bs\?[^"]*)"/g,
            function(match, url) {
                if (match.includes('[[CLICK_TRACKING_BEACON]]')) return match;
                url = url.replace(/&vurl=\$\$\[\[APP_ID\]\]\$\$/g, '');
                return 'href="[[CLICK_TRACKING_BEACON]]' + url + '"';
            }
        );

        code = code.replace(/\$\$erid\$\$/g, function() {
            return '$$[[CREATIVE_ORD_TOKEN]]$$';
        });

        return code;
    }

    // =============================================
    //  АДРИВЕР
    // =============================================
    function transformAdriver(code) {
        if (!code.includes("'click':['[[CLICK_TRACKING_BEACON]]']")) {
            code = code.replace(
                /(window\.adrivermraiddata\.trackers\s*=\s*\{)/,
                '$1\n    \'click\':[\'[[CLICK_TRACKING_BEACON]]\'],'
            );
        }
        if (!code.includes('custom=[[EVENT_ID]]')) {
            code = code.replace(
                /(https:\/\/ad\.adriver\.ru\/cgi-bin\/merle\.cgi\?[^&]*)/,
                '$1&custom=[[EVENT_ID]]'
            );
        }
        if (!code.includes('erir=[[CREATIVE_ORD_TOKEN]]')) {
            code = code.replace(
                /(https:\/\/ad\.adriver\.ru\/cgi-bin\/merle\.cgi\?[^"]*)/,
                '$1&erir=[[CREATIVE_ORD_TOKEN]]'
            );
        }
        return code;
    }

    // =============================================
    //  ВЕБОРАМА — СОХРАНЯЕТ ФОРМАТИРОВАНИЕ!
    // =============================================
    function transformWeborama(code) {
        // Разбиваем код на строки, чтобы сохранить форматирование
        let lines = code.split('\n');
        let resultLines = [];

        for (let line of lines) {
            let newLine = line;

            // Убираем экранные кавычки
            newLine = newLine.replace(/""/g, '"');

            // Заменяем clicktrackers : [] → clicktrackers : '[[CLICK_TRACKING_BEACON]]'
            newLine = newLine.replace(/(clicktrackers\s*:\s*)\[\]/g, '$1\'[[CLICK_TRACKING_BEACON]]\'');

            // Заменяем customparameter : '' → customparameter : '[[EVENT_ID]]'
            newLine = newLine.replace(/(customparameter\s*:\s*)''/g, '$1\'[[EVENT_ID]]\'');
            newLine = newLine.replace(/(customparameter\s*:\s*)""/g, '$1\'[[EVENT_ID]]\'');

            // Заменяем erid : '[ERID]' → erid : '[[CREATIVE_ORD_TOKEN]]'
            newLine = newLine.replace(/(erid\s*:\s*)'\[ERID\]'/g, '$1\'[[CREATIVE_ORD_TOKEN]]\'');
            newLine = newLine.replace(/(erid\s*:\s*)"\[ERID\]"/g, '$1\'[[CREATIVE_ORD_TOKEN]]\'');

            // Заменяем random : '[RANDOM]' → random : '[[RANDOM]]'
            newLine = newLine.replace(/(random\s*:\s*)'\[RANDOM\]'/g, '$1\'[[RANDOM]]\'');
            newLine = newLine.replace(/(random\s*:\s*)"\[RANDOM\]"/g, '$1\'[[RANDOM]]\'');

            // Заменяем [RANDOM] → [[RANDOM]] в ссылках
            newLine = newLine.replace(/\[RANDOM\]/g, '[[RANDOM]]');

            // Добавляем [[CLICK_PREFIX]] в href если нет
            if (newLine.includes('href=') && newLine.includes('https://wcm.weborama-tech.ru')) {
                if (!newLine.includes('[[CLICK_PREFIX]]')) {
                    newLine = newLine.replace(
                        /(href\s*=\s*)(["']+)(https:\/\/wcm\.weborama-tech\.ru\/fcgi-bin\/dispatch\.fcgi\?[^"']*)(["']+)/g,
                        '$1$2[[CLICK_PREFIX]]$3$4'
                    );
                }
            }

            resultLines.push(newLine);
        }

        return resultLines.join('\n');
    }

    // =============================================
    //  ОСНОВНАЯ ФУНКЦИЯ
    // =============================================
    function transform() {
        const select = document.getElementById('verificator');
        const input = document.getElementById('inputCode');
        const output = document.getElementById('output');

        let code = input.value;
        if (!code.trim()) { output.textContent = '⚠️ Вставь исходный код креатива!'; return; }

        switch(select.value) {
            case 'adserving': code = transformAdserving(code); break;
            case 'adriver': code = transformAdriver(code); break;
            case 'weborama': code = transformWeborama(code); break;
            default: output.textContent = '❌ Верификатор не найден'; return;
        }

        // НИЧЕГО НЕ УБИРАЕМ! Просто выводим результат
        output.textContent = code;
    }

    function copyOutput() {
        const output = document.getElementById('output');
        const text = output.textContent;
        if (!text || text === 'Нажми «Преобразовать»' || text.startsWith('⚠️') || text.startsWith('❌')) {
            alert('Сначала преобразуй код!');
            return;
        }
        navigator.clipboard.writeText(text).then(() => {
            alert('✅ Готовый код скопирован в буфер обмена!');
        }).catch(() => {
            const range = document.createRange();
            range.selectNode(output);
            window.getSelection().removeAllRanges();
            window.getSelection().addRange(range);
            document.execCommand('copy');
            alert('✅ Скопировано!');
        });
    }

    window.onload = function() {
        updateInfo();
        loadPreset('adserving');
    };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adspector HTML</title>
    <style>
        * { box-sizing: border-box; font-family: system-ui, -apple-system, sans-serif; }
        body { background: #f3f0ff; padding: 30px; display: flex; justify-content: center; }
        .container { max-width: 1100px; width: 100%; background: white; padding: 30px; border-radius: 24px; box-shadow: 0 12px 40px rgba(120, 80, 200, 0.15); border: 1px solid #e8e0f5; }
        h1 { margin-top: 0; color: #4a1a8a; font-weight: 700; display: flex; align-items: center; gap: 10px; }
        h1 span { background: #7c3aed; color: white; font-size: 14px; padding: 4px 14px; border-radius: 40px; font-weight: 500; }
        .row { display: flex; gap: 20px; flex-wrap: wrap; }
        .col { flex: 1; min-width: 300px; }
        label { font-weight: 600; font-size: 14px; color: #4a1a8a; display: block; margin: 16px 0 6px; }
        select, textarea { width: 100%; padding: 12px; border: 2px solid #d8caf5; border-radius: 12px; font-size: 14px; font-family: 'Courier New', monospace; background: #faf8ff; transition: 0.2s; }
        select:focus, textarea:focus { outline: none; border-color: #7c3aed; background: white; box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.1); }
        textarea { height: 280px; resize: vertical; }
        .output { background: #f8f5ff; border: 2px solid #d8caf5; border-radius: 12px; padding: 16px; font-family: 'Courier New', monospace; font-size: 13px; white-space: pre-wrap; word-break: break-all; max-height: 500px; overflow-y: auto; }
        .btn { background: #7c3aed; color: white; border: none; padding: 14px 28px; border-radius: 40px; font-weight: 600; font-size: 16px; cursor: pointer; margin-top: 20px; width: 100%; transition: 0.2s; }
        .btn:hover { background: #5b21b6; transform: scale(1.01); box-shadow: 0 8px 25px rgba(124, 58, 237, 0.3); }
        .btn-copy { background: #6d28d9; margin-top: 10px; }
        .btn-copy:hover { background: #4c1d95; }
        .info-box { background: #ede9fe; border-left: 4px solid #7c3aed; padding: 12px 16px; border-radius: 8px; margin: 12px 0; font-size: 14px; color: #3b1a6e; }
        .footer { margin-top: 24px; color: #7c6a9e; font-size: 14px; border-top: 1px solid #e8e0f5; padding-top: 20px; text-align: center; }
        .macro-list { display: flex; gap: 12px; flex-wrap: wrap; margin: 8px 0; }
        .macro-tag { background: #ddd6fe; color: #4a1a8a; padding: 4px 14px; border-radius: 20px; font-family: 'Courier New', monospace; font-size: 13px; font-weight: 500; }
        .badge { background: #7c3aed; color: white; border-radius: 40px; padding: 4px 14px; font-size: 13px; font-weight: 500; margin-left: 8px; }
    </style>
</head>
<body>
<div class="container">
    <h1>🔮 Adspector HTML <span>verificator</span></h1>
    <div class="info-box" id="infoBox">⚡ Выбери верификатора</div>
    <div class="row">
        <div class="col">
            <label for="verificator">🔹 Верификатор</label>
            <select id="verificator" onchange="updateInfo()">
                <option value="adserving">Адсервинг</option>
                <option value="adriver">Адривер</option>
                <option value="weborama">Веборама</option>
            </select>

            <label for="inputCode">📄 Исходный код креатива</label>
            <textarea id="inputCode" placeholder="Вставь HTML-код с макросами..."></textarea>

            <button class="btn" onclick="transform()">⚡ Преобразовать</button>
        </div>
        <div class="col">
            <label>✅ Готовый код с макросами</label>
            <div id="output" class="output">Нажми «Преобразовать»</div>
            <button class="btn btn-copy" onclick="copyOutput()">📋 Скопировать результат</button>
        </div>
    </div>
    <div class="footer">🔧 Вставь код → выбери верификатора → получи готовый результат</div>
</div>
<script>
    const INFO = {
        adserving: {
            label: 'Адсервинг',
            macros: ['ncu=$$[[CLICK_TRACKING_BEACON]]$$& (только в script)', '[[CLICK_TRACKING_BEACON]] (только в href)', '$$[[CREATIVE_ORD_TOKEN]]$$', 'vurl=$$[[APP_ID]]$$ (только в src)'],
            description: 'Заменяем $$erid$$ → $$[[CREATIVE_ORD_TOKEN]]$$, добавляем ncu= и vurl='
        },
        adriver: {
            label: 'Адривер',
            macros: ['[[CLICK_TRACKING_BEACON]]', '[[RANDOM]]', '[[CREATIVE_ORD_TOKEN]]', '[[EVENT_ID]]'],
            description: 'Добавляем трекер кликов в window.adrivermraiddata.trackers.click'
        },
        weborama: {
            label: 'Веборама',
            macros: ['[[CLICK_TRACKING_BEACON]]', '[[EVENT_ID]]', '[[CREATIVE_ORD_TOKEN]]', '[[RANDOM]]', '[[CLICK_PREFIX]]'],
            description: 'Меняем clicktrackers, customparameter, erid, random и добавляем [[CLICK_PREFIX]] в href'
        }
    };

    function updateInfo() {
        const select = document.getElementById('verificator');
        const infoBox = document.getElementById('infoBox');
        const key = select.value;
        const info = INFO[key];
        if (info) {
            let macrosHtml = info.macros.map(m => `<span class="macro-tag">${m}</span>`).join('');
            infoBox.innerHTML = `⚡ <b>${info.label}:</b> ${info.description}<div class="macro-list">${macrosHtml}</div>`;
        }
    }

    function transformAdserving(code) {
        code = code.replace(/\$\$erid\$\$/g, function() {
            return '$$[[CREATIVE_ORD_TOKEN]]$$';
        });

        code = code.replace(
            /(<script[^>]*src="https:\/\/bs\.serving-sys\.ru\/Serving\/adServer\.bs\?)([^"]*)"/g,
            function(match, prefix, params) {
                if (params.includes('ncu=')) return match;
                return prefix + 'ncu=$$[[CLICK_TRACKING_BEACON]]$$&' + params + '"';
            }
        );

        code = code.replace(
            /(src="https:\/\/bs\.serving-sys\.ru\/Serving\/adServer\.bs\?)([^"]*)"/g,
            function(match, prefix, params) {
                if (params.includes('vurl=')) return match;
                return prefix + params + '&vurl=$$[[APP_ID]]$$"';
            }
        );

        code = code.replace(
            /href="(https:\/\/bs\.serving-sys\.ru\/Serving\/adServer\.bs\?[^"]*)"/g,
            function(match, url) {
                if (match.includes('[[CLICK_TRACKING_BEACON]]')) return match;
                url = url.replace(/&vurl=\$\$\[\[APP_ID\]\]\$\$/g, '');
                return 'href="[[CLICK_TRACKING_BEACON]]' + url + '"';
            }
        );

        code = code.replace(/\$\$erid\$\$/g, function() {
            return '$$[[CREATIVE_ORD_TOKEN]]$$';
        });

        return code;
    }

    function transformAdriver(code) {
        if (!code.includes("'click':['[[CLICK_TRACKING_BEACON]]']")) {
            code = code.replace(
                /(window\.adrivermraiddata\.trackers\s*=\s*\{)/,
                '$1\n    \'click\':[\'[[CLICK_TRACKING_BEACON]]\'],'
            );
        }
        if (!code.includes('custom=[[EVENT_ID]]')) {
            code = code.replace(
                /(https:\/\/ad\.adriver\.ru\/cgi-bin\/merle\.cgi\?[^&]*)/,
                '$1&custom=[[EVENT_ID]]'
            );
        }
        if (!code.includes('erir=[[CREATIVE_ORD_TOKEN]]')) {
            code = code.replace(
                /(https:\/\/ad\.adriver\.ru\/cgi-bin\/merle\.cgi\?[^"]*)/,
                '$1&erir=[[CREATIVE_ORD_TOKEN]]'
            );
        }
        return code;
    }

    function transformWeborama(code) {
        code = code.replace(/""/g, '"');

        code = code.replace(
            /(clicktrackers\s*:\s*)\[\]/g,
            '$1\'[[CLICK_TRACKING_BEACON]]\''
        );

        code = code.replace(
            /(customparameter\s*:\s*)''/g,
            '$1\'[[EVENT_ID]]\''
        );
        code = code.replace(
            /(customparameter\s*:\s*)""/g,
            '$1\'[[EVENT_ID]]\''
        );

        code = code.replace(
            /(erid\s*:\s*)'\[ERID\]'/g,
            '$1\'[[CREATIVE_ORD_TOKEN]]\''
        );
        code = code.replace(
            /(erid\s*:\s*)"\[ERID\]"/g,
            '$1\'[[CREATIVE_ORD_TOKEN]]\''
        );

        code = code.replace(
            /(random\s*:\s*)(['"]+)(\[*)RANDOM(\]*)(['"]+)/g,
            '$1$2[[RANDOM]]$5'
        );

        code = code.replace(
            /(\[*)RANDOM(\]*)/g,
            '[[RANDOM]]'
        );

        code = code.replace(
            /(href\s*=\s*)(["']+)(https:\/\/wcm\.weborama-tech\.ru\/fcgi-bin\/dispatch\.fcgi\?[^"']*)(["']+)/g,
            function(match, hrefPrefix, quote1, url, quote2) {
                if (match.includes('[[CLICK_PREFIX]]')) return match;
                return hrefPrefix + quote1 + '[[CLICK_PREFIX]]' + url + quote2;
            }
        );

        code = code.replace(
            /(href=)(https:\/\/wcm\.weborama-tech\.ru\/fcgi-bin\/dispatch\.fcgi\?[^>\s]*)/g,
            function(match, hrefPrefix, url) {
                if (match.includes('[[CLICK_PREFIX]]')) return match;
                return hrefPrefix + '"[[CLICK_PREFIX]]' + url + '"';
            }
        );

        code = code.replace(/\[{1,3}RANDOM\]{1,3}/g, '[[RANDOM]]');
        code = code.replace(/\[{1,2}CLICK_TRACKING_BEACON\]{1,2}/g, '[[CLICK_TRACKING_BEACON]]');
        code = code.replace(/\[{1,2}EVENT_ID\]{1,2}/g, '[[EVENT_ID]]');
        code = code.replace(/\[{1,2}CREATIVE_ORD_TOKEN\]{1,2}/g, '[[CREATIVE_ORD_TOKEN]]');
        code = code.replace(/\[{1,2}CLICK_PREFIX\]{1,2}/g, '[[CLICK_PREFIX]]');

        return code;
    }

    function transform() {
        const select = document.getElementById('verificator');
        const input = document.getElementById('inputCode');
        const output = document.getElementById('output');

        let code = input.value;
        if (!code.trim()) { output.textContent = '⚠️ Вставь исходный код креатива!'; return; }

        switch(select.value) {
            case 'adserving': code = transformAdserving(code); break;
            case 'adriver': code = transformAdriver(code); break;
            case 'weborama': code = transformWeborama(code); break;
            default: output.textContent = '❌ Верификатор не найден'; return;
        }

        // ФИНАЛЬНАЯ ОЧИСТКА
        code = code.replace(/""/g, '"');
        code = code.replace(/\s+/g, ' ').trim();

        output.textContent = code;
    }

    function copyOutput() {
        const output = document.getElementById('output');
        const text = output.textContent;
        if (!text || text === 'Нажми «Преобразовать»' || text.startsWith('⚠️') || text.startsWith('❌')) {
            alert('Сначала преобразуй код!');
            return;
        }
        navigator.clipboard.writeText(text).then(() => {
            alert('✅ Готовый код скопирован в буфер обмена!');
        }).catch(() => {
            const range = document.createRange();
            range.selectNode(output);
            window.getSelection().removeAllRanges();
            window.getSelection().addRange(range);
            document.execCommand('copy');
            alert('✅ Скопировано!');
        });
    }

    window.onload = function() {
        updateInfo();
    };
</script>
</body>
</html>
